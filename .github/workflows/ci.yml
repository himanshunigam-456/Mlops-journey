name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Create venv + install project-0-warmup
        run: |
          uv venv .venv --python 3.11
          uv pip install -e "./project-0-warmup[dev]"
          uv pip install pre-commit

      - name: Run pre-commit (ruff lint + format check)
        run: |
          source .venv/bin/activate
          pre-commit run --all-files

      - name: Run pytest
        run: |
          source .venv/bin/activate
          pytest project-0-warmup -v
