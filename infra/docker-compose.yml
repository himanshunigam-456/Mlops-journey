services:
  postgres:
    image: postgres:16-alpine
    container_name: mlops-postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: REDACTED-OLD-DEFAULT
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: mlops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: REDACTED-OLD-DEFAULT
      MINIO_ROOT_PASSWORD: REDACTED-OLD-DEFAULT
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console UI
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    # one-shot: creates the 'mlflow' bucket on first start
    image: minio/mc:RELEASE.2024-08-17T11-33-50Z
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 REDACTED-OLD-DEFAULT REDACTED-OLD-DEFAULT &&
      mc mb -p local/mlflow &&
      mc mb -p local/datasets &&
      echo 'buckets ready'
      "

  redis:
    image: redis:7-alpine
    container_name: mlops-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: mlops-mlflow
    depends_on:
      postgres: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: REDACTED-OLD-DEFAULT
      AWS_SECRET_ACCESS_KEY: REDACTED-OLD-DEFAULT
    ports:
      - "5000:5000"
    # entrypoint retries pip install (handles transient DNS issues) then exec mlflow
    volumes:
      - ./mlflow-entrypoint.sh:/mlflow-entrypoint.sh:ro
    entrypoint: ["/mlflow-entrypoint.sh"]
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://REDACTED:REDACTED@postgres:5432/mlflow
      --artifacts-destination s3://mlflow/
      --serve-artifacts
    # MLflow image has no curl — use python to hit /health instead
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 30
